name: CI

on:
  push:
    branches:
      - main
      - develop
      - sandbox
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run required checks
        run: node tests/run-all.js
